[alembic]
script_location = src/moist_bot/migrations
prepend_sys_path = .
path_separator = os
# Runtime value is set by src/moist_bot/migrations/env.py from
# moist_bot.db.engine.DATABASE_URL.
sqlalchemy.url = driver://unused

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
